# Configuración Firebase App Hosting
# Variables públicas: en value. Credenciales sensibles: referencias a Secret Manager.
# Para crear secretos: firebase apphosting:secrets:set NOMBRE_SECRETO
# Ver docs/DEPLOYMENT_CREDENTIALS.md

runConfig:
  maxInstances: 1
  timeoutSeconds: 120

env:
  # Firebase (cliente) - públicas, van al bundle del cliente
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyBYvIGN0-Yd1b7LG2Seg6VwfKnTYIo4n_4"
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "shotanalisys.firebaseapp.com"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "shotanalisys"
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "shotanalisys.firebasestorage.app"
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "602998191800"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:602998191800:web:426a31666e329722c5264d"
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://chaaaas.com"

  # URLs y config no sensible
  - variable: MP_WEBHOOK_URL
    value: "https://chaaaas.com/api/payments/webhook"
  - variable: MP_BASE_URL
    value: "https://api.mercadopago.com"
  - variable: DLOCAL_BASE_URL
    value: "https://api.dlocalgo.com"
  - variable: DLOCAL_WEBHOOK_URL
    value: "https://chaaaas.com/api/payments/webhook-dlocal"
  - variable: DLOCAL_RETURN_URL
    value: "https://chaaaas.com/payments/return"
  - variable: USD_EXCHANGE_RATE
    value: "1000"

  # Firebase Admin (no sensible)
  - variable: FIREBASE_ADMIN_PROJECT_ID
    value: "shotanalisys"
  - variable: FIREBASE_ADMIN_STORAGE_BUCKET
    value: "shotanalisys.firebasestorage.app"
  - variable: GOOGLE_CLOUD_PROJECT
    value: "shotanalisys"

  # SECRETOS - Crear con: firebase apphosting:secrets:set NOMBRE
  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_ADMIN_CLIENT_EMAIL
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
  - variable: MP_ACCESS_TOKEN_AR
    secret: MP_ACCESS_TOKEN_AR
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: GOOGLE_API_KEY
    secret: GOOGLE_API_KEY
  - variable: GOOGLE_GENAI_API_KEY
    secret: GOOGLE_GENAI_API_KEY
  - variable: DLOCAL_API_KEY
    secret: DLOCAL_API_KEY
  - variable: DLOCAL_SECRET_KEY
    secret: DLOCAL_SECRET_KEY

backends:
  - id: shot-analysis
  - id: shot-analysis-1
    region: us-central1

flows:
  - id: processUploadedVideo
    entryPoint: processUploadedVideo
    allowInsecure: true
